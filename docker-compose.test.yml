services:
  grampsweb_redis:
    image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  grampsweb_celery:
    # Keep in sync with your deployed Gramps Web instance version when bumping.
    image: ghcr.io/gramps-project/grampsweb:26.6.1@sha256:563d05ebb788fd42695ab4f5ec05efbfb86aa73d25901e6428fa9b0aab763551
    depends_on:
      grampsweb_redis:
        condition: service_healthy
    environment: &grampsweb_env
      GRAMPSWEB_TREE: "Test Tree"
      GRAMPSWEB_SECRET_KEY: "test-only-secret-key-do-not-use-in-production"
      GRAMPSWEB_CELERY_CONFIG__broker_url: "redis://grampsweb_redis:6379/0"
      GRAMPSWEB_CELERY_CONFIG__result_backend: "redis://grampsweb_redis:6379/0"
      GRAMPSWEB_RATELIMIT_STORAGE_URI: "redis://grampsweb_redis:6379/1"
    command: celery -A gramps_webapi.celery worker --loglevel=INFO --pool=solo
    volumes: &grampsweb_volumes
      - gramps_users:/app/users
      - gramps_indexdir:/app/indexdir
      - gramps_cache:/app/cache
      - gramps_media:/app/media
      - gramps_export:/app/export_cache
      - gramps_data:/root/.gramps
    healthcheck:
      test: ["CMD-SHELL", "celery -A gramps_webapi.celery inspect ping --timeout 5 2>/dev/null"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  grampsweb:
    # Keep in sync with your deployed Gramps Web instance version when bumping.
    image: ghcr.io/gramps-project/grampsweb:26.6.1@sha256:563d05ebb788fd42695ab4f5ec05efbfb86aa73d25901e6428fa9b0aab763551
    depends_on:
      grampsweb_celery:
        condition: service_healthy
    ports:
      - "127.0.0.1:5055:5000"
    environment: *grampsweb_env
    volumes: *grampsweb_volumes
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/')",
        ]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 15s

volumes:
  gramps_users:
  gramps_indexdir:
  gramps_cache:
  gramps_media:
  gramps_export:
  gramps_data:
