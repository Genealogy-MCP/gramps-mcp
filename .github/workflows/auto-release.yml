name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  detect:
    name: Detect release commit
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
      changelog: ${{ steps.changelog.outputs.content }}

    steps:
      - uses: actions/checkout@v6

      - name: Check commit message
        id: check
        run: |
          # Read from git object store (safe from expression injection)
          SUBJECT=$(git log -1 --format=%s)
          echo "Commit subject: $SUBJECT"

          if [[ "$SUBJECT" =~ ^chore:\ release\ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "Detected release commit for v$VERSION"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Not a release commit, skipping"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate pyproject.toml version
        if: steps.check.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          PYPROJECT_VERSION=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              match = re.search(r'^version\s*=\s*\"([^\"]+)\"', f.read(), re.MULTILINE)
              print(match.group(1) if match else '')
          ")

          if [[ "$PYPROJECT_VERSION" != "$VERSION" ]]; then
            echo "::error::pyproject.toml version ($PYPROJECT_VERSION) does not match release version ($VERSION)"
            exit 1
          fi
          echo "pyproject.toml version matches: $PYPROJECT_VERSION"

      - name: Validate CHANGELOG.md has version section
        if: steps.check.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing section for [$VERSION]"
            exit 1
          fi
          echo "CHANGELOG.md has section for [$VERSION]"

      - name: Validate tag does not exist
        if: steps.check.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "::error::Tag v$VERSION already exists on remote"
            exit 1
          fi
          echo "Tag v$VERSION does not exist yet"

      - name: Extract changelog section
        id: changelog
        if: steps.check.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          # Extract content between ## [VERSION] and next ## [
          CONTENT=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

          # Write to multiline output
          {
            echo "content<<CHANGELOG_EOF"
            echo "$CONTENT"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Create tag and GitHub Release
    needs: detect
    if: needs.detect.outputs.is_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.detect.outputs.version }}
          CHANGELOG: ${{ needs.detect.outputs.changelog }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "$CHANGELOG"

  docker:
    name: Build and push Docker image
    needs: [detect, release]
    if: needs.detect.outputs.is_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/genealogy-mcp/${{ github.event.repository.name }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.detect.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.detect.outputs.version }}
            type=semver,pattern={{major}},value=v${{ needs.detect.outputs.version }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
