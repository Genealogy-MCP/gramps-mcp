name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: |
          uv run ruff check src/
          uv run ruff format --check src/

      - name: Check copyright headers
        run: |
          find src/ scripts/ -name '*.py' -exec python scripts/check_copyright_header.py {} +

      - name: Type check
        run: uv run pyright src/

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    env:
      REQUIRE_INTEGRATION: "1"
      GRAMPS_API_URL: http://localhost:5055
      GRAMPS_USERNAME: owner
      GRAMPS_PASSWORD: owner

    steps:
      - uses: actions/checkout@v6

      - name: Set Docker Compose project name
        run: echo "COMPOSE_PROJECT_NAME=gramps-test-py${PYTHON_VERSION//./-}" >> "$GITHUB_ENV"
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Docker images
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache
          key: docker-grampsweb-${{ hashFiles('docker-compose.test.yml') }}

      - name: Load cached Docker images
        run: |
          if [ -f /tmp/docker-cache/images.tar ]; then
            docker load -i /tmp/docker-cache/images.tar
          fi

      - name: Install dependencies
        run: uv sync

      - name: Start Gramps Web test instance
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Seed test database
        run: uv run python scripts/seed_test_db.py

      - name: Run tests
        run: uv run pytest

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --tail=100

      - name: Save Docker images to cache
        if: always()
        run: |
          mkdir -p /tmp/docker-cache
          docker save $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'grampsweb|redis') \
            > /tmp/docker-cache/images.tar 2>/dev/null || true

      - name: Stop test instance
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  security:
    name: security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Audit dependencies
        run: uv run pip-audit
